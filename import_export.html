<!DOCTYPE html>
<html>
<head>
    <title>CSV to Firestore</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
</head>
<body>

  <h2>Import CSV to Firestore</h2>

  <div>
    <span id="userInfo">ยังไม่ได้เข้าสู่ระบบ</span>
    <button id="loginBtn" onclick="login()">เข้าสู่ระบบด้วย Google</button>
    <button id="logoutBtn" onclick="logout()" style="display:none">ออกจากระบบ</button>
  </div>

  <div id="importSection" style="display:none; margin-top:16px">
    <div>
      <label>Collection:
        <select id="collectionSelect">
          <option value="ICD10">ICD10 (key: code)</option>
          <option value="medicine">medicine (key: name)</option>
        </select>
      </label>
    </div>
    <div style="margin-top:8px">
      <input type="file" id="csvFile" accept=".csv">
      <button onclick="checkCsv()">Check CSV</button>
      <button onclick="importCsv()">Import CSV</button>
    </div>
    <div style="margin-top:8px">
      <button onclick="exportCsv()">Export CSV</button>
    </div>
    <div style="margin-top:16px; border-top:1px solid #ccc; padding-top:12px">
      Doc ID length &lt;
      <input type="number" id="idLenThreshold" value="7" min="1" style="width:50px; border:1px solid #ccc; padding:2px 4px;">
      <button onclick="previewDeleteByIdLen()">Preview</button>
      <button onclick="deleteByIdLen()" style="color:white; background:#dc3545; border:none; padding:4px 10px; border-radius:4px; cursor:pointer">Delete</button>
    </div>
  </div>

  <pre id="output"></pre>

  <script>
    // ✅ กำหนดค่า Firebase ของคุณ
      const firebaseConfig = {
          apiKey: "AIzaSyC5WWSxG9iLQMZqO057qZ-Q4EA19d3Q1eE",
          authDomain: "pg-firstaid.firebaseapp.com",
          projectId: "pg-firstaid"
      };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const auth = firebase.auth();

    auth.onAuthStateChanged(user => {
      if (user) {
        document.getElementById('userInfo').textContent = `เข้าสู่ระบบแล้ว: ${user.displayName} (${user.email})`;
        document.getElementById('loginBtn').style.display = 'none';
        document.getElementById('logoutBtn').style.display = 'inline-block';
        document.getElementById('importSection').style.display = 'block';
      } else {
        document.getElementById('userInfo').textContent = 'ยังไม่ได้เข้าสู่ระบบ';
        document.getElementById('loginBtn').style.display = 'inline-block';
        document.getElementById('logoutBtn').style.display = 'none';
        document.getElementById('importSection').style.display = 'none';
      }
    });

    function login() {
      const provider = new firebase.auth.GoogleAuthProvider();
      auth.signInWithPopup(provider).catch(err => {
        alert('เข้าสู่ระบบล้มเหลว: ' + err.message);
      });
    }

    function logout() {
      auth.signOut();
    }

    const collectionKeys = {
      ICD10: 'code',
      medicine: 'name'
    };

    function getSelected() {
      const col = document.getElementById('collectionSelect').value;
      return { col, key: collectionKeys[col] };
    }

    async function exportCsv() {
      const { col } = getSelected();
      document.getElementById('output').textContent = `กำลัง export ${col}...`;
      try {
        const snapshot = await db.collection(col).get();
        if (snapshot.empty) {
          document.getElementById('output').textContent = `ไม่มีข้อมูลใน ${col}`;
          return;
        }
        const rows = snapshot.docs.map(doc => doc.data());
        const csv = Papa.unparse(rows);
        const blob = new Blob(['﻿' + csv], { type: 'text/csv;charset=utf-8;' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `${col}_${new Date().toISOString().slice(0,10)}.csv`;
        a.click();
        URL.revokeObjectURL(url);
        document.getElementById('output').textContent = `Export ${col} สำเร็จ ${rows.length} รายการ`;
      } catch (error) {
        document.getElementById('output').textContent = 'Export ล้มเหลว: ' + error.message;
      }
    }

    async function getDocsToDelete() {
      const { col } = getSelected();
      const threshold = parseInt(document.getElementById('idLenThreshold').value) || 7;
      const snapshot = await db.collection(col).get();
      return snapshot.docs.filter(doc => doc.id.length < threshold);
    }

    async function previewDeleteByIdLen() {
      const output = document.getElementById('output');
      output.textContent = 'กำลังโหลด...';
      const { col } = getSelected();
      const threshold = parseInt(document.getElementById('idLenThreshold').value) || 7;
      const docs = await getDocsToDelete();
      if (docs.length === 0) {
        output.textContent = `ไม่พบ doc ที่มี ID length < ${threshold} ใน ${col}`;
        return;
      }
      output.textContent = `พบ ${docs.length} doc ที่ ID length < ${threshold}:\n` +
        docs.map(d => `  ${d.id} (${d.id.length} chars)`).join('\n');
    }

    async function deleteByIdLen() {
      const { col } = getSelected();
      const threshold = parseInt(document.getElementById('idLenThreshold').value) || 7;
      const docs = await getDocsToDelete();
      if (docs.length === 0) {
        document.getElementById('output').textContent = 'ไม่พบ doc ที่ต้องลบ';
        return;
      }
      if (!confirm(`ยืนยันลบ ${docs.length} doc ที่มี ID length < ${threshold} ใน ${col}?`)) return;
      const output = document.getElementById('output');
      output.textContent = `กำลังลบ ${docs.length} doc...`;
      let deleted = 0, failed = 0;
      for (const doc of docs) {
        try {
          await db.collection(col).doc(doc.id).delete();
          deleted++;
        } catch (e) {
          console.error('ลบล้มเหลว:', doc.id, e);
          failed++;
        }
      }
      output.textContent = `ลบเสร็จ: ${deleted} doc, ผิดพลาด ${failed} doc`;
    }

    function checkCsv() {
      const file = document.getElementById('csvFile').files[0];
      if (!file) { alert('กรุณาเลือกไฟล์ CSV'); return; }
      Papa.parse(file, {
        header: true,
        preview: 1,
        complete: function(results) {
          const rawKeys = Object.keys(results.data[0] || {});
          const info = rawKeys.map(k => {
            const codes = Array.from(k).map(c => c.charCodeAt(0));
            return `"${k}" [${codes.join(',')}]`;
          });
          document.getElementById('output').textContent =
            `Columns (${rawKeys.length}):\n` + info.join('\n');
        }
      });
    }

    function importCsv() {
      const { col, key } = getSelected();
      const file = document.getElementById('csvFile').files[0];
      if (!file) { alert('กรุณาเลือกไฟล์ CSV'); return; }

      document.getElementById('output').textContent = `กำลังโหลดข้อมูลจาก ${col}...`;

      Papa.parse(file, {
        header: true,
        skipEmptyLines: true,
        complete: async function(results) {
          const rows = results.data;

          // โหลด docs ทั้งหมดจาก Firestore แล้ว map ด้วย key field
          const snapshot = await db.collection(col).get();
          const docMap = {};
          snapshot.forEach(doc => {
            const val = (doc.data()[key] || '').toString().trim();
            if (val) docMap[val] = doc.id;
          });

          document.getElementById('output').textContent =
            `พบ ${snapshot.size} docs ใน Firestore, CSV มี ${rows.length} รายการ กำลังอัปเดต...`;

          let success = 0, skipped = 0, failed = 0;
          for (const row of rows) {
            const keyValue = (row[key] || '').toString().trim();
            if (!keyValue) { skipped++; continue; }

            const docId = docMap[keyValue];
            if (!docId) { skipped++; continue; }

            try {
              await db.collection(col).doc(docId).update(row);
              success++;
            } catch (error) {
              console.error(`เกิดข้อผิดพลาด ${key}=${keyValue}:`, error);
              failed++;
            }
          }
          const skipMsg = skipped > 0 ? `, ข้าม ${skipped} รายการ (ไม่พบใน Firestore)` : '';
          document.getElementById('output').textContent =
            `เสร็จสิ้น [${col}]: อัปเดต ${success} รายการ${skipMsg}, ผิดพลาด ${failed} รายการ`;
        }
      });
    }
  </script>

</body>
</html>
